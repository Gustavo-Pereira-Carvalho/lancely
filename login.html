<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lancely - Login</title>

  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <div class="card-wrapper" id="cardWrapper">

    <!-- LOGIN -->
    <div class="card login">
      <h2>Entrar</h2>

      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginSenha" type="password" placeholder="Senha">

      <button onclick="login()">Entrar</button>

      <p onclick="toggleCard()">Criar conta</p>
    </div>

    <!-- REGISTER -->
    <div class="card register">
      <h2>Criar conta</h2>

      <input id="registerNome" placeholder="Nome">
      <input id="registerEmail" type="email" placeholder="Email">
      <input id="registerSenha" type="password" placeholder="Senha">

      <button onclick="register()">Criar conta</button>

      <p onclick="toggleCard()">Já tenho conta</p>
    </div>

  </div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
